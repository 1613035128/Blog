<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>昴星团</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    .landing-section {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: 9999;
    }
    
    .background-slider {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    
    /* 底层背景图 */
    .background-slider::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('/landing/images/bg-default.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }
    
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transform: translateX(100%);
      /* 默认无transition，通过JS控制 */
      z-index: 2;
    }
    
    .bg-image.transition {
      transition: transform 600ms ease-in-out, opacity 600ms ease-in-out;
    }
    
    .bg-image.active {
      opacity: 1;
      transform: translateX(0);
      z-index: 2;
    }
    
    .landing-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }
    
    .landing-title {
      font-size: 4rem;
      font-weight: 700;
      margin: 0 0 1rem 0;
      letter-spacing: 0.5rem;
      animation: fadeInUp 1s ease-out;
    }
    
    .landing-subtitle {
      font-size: 1.2rem;
      font-weight: 300;
      margin: 0 0 2rem 0;
      opacity: 0.9;
      max-width: 600px;
      line-height: 1.6;
      overflow: hidden;
      height: 1.6em;
      position: relative;
    }
    
    .landing-subtitle-text {
      display: inline-block;
      transition: transform 600ms ease-in-out, opacity 600ms ease-in-out;
    }
    
    .landing-subtitle-text.slide-in-right {
      animation: slideInRight 600ms ease-in-out forwards;
    }
    
    .landing-subtitle-text.slide-in-left {
      animation: slideInLeft 600ms ease-in-out forwards;
    }
    
    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 0.9;
      }
    }
    
    @keyframes slideInLeft {
      from {
        transform: translateX(-100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 0.9;
      }
    }
    
    .enter-button {
      display: inline-block;
      padding: 15px 40px;
      background-color: #39c5bb;
      color: #fff;
      text-decoration: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 500;
      transition: all 0.3s ease;
      animation: fadeInUp 1s ease-out 0.6s both;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(57, 197, 187, 0.4);
    }
    
    .enter-button:hover {
      background-color: #2da89e;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(57, 197, 187, 0.6);
    }
    
    .nav-zones {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      z-index: 5;
    }
    
    .nav-zone {
      height: 100%;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    
    .nav-zone:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }
    
    .nav-zone-left {
      width: 20%;
    }
    
    .nav-zone-center {
      width: 60%;
      cursor: default;
    }
    
    .nav-zone-center:hover {
      background-color: transparent;
    }
    
    .nav-zone-right {
      width: 20%;
    }
    
    .nav-hints {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 2rem;
      pointer-events: none;
      z-index: 6;
    }
    
    .nav-hint {
      font-size: 3rem;
      color: rgba(255, 255, 255, 0.3);
      transition: color 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    
    .nav-zone-left:hover ~ .nav-hints .nav-hint-left,
    .nav-zone-right:hover ~ .nav-hints .nav-hint-right {
      opacity: 1;
      color: rgba(255, 255, 255, 0.6);
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @media (max-width: 768px) {
      .landing-title {
        font-size: 2.5rem;
        letter-spacing: 0.3rem;
      }
      
      .landing-subtitle {
        font-size: 1rem;
        padding: 0 2rem;
      }
      
      .enter-button {
        padding: 12px 30px;
        font-size: 1rem;
      }
      
      .nav-hint {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div id="landing-section" class="landing-section">
    <div class="background-slider">
      <div class="bg-image active" data-index="0" style="transform: translateX(0);"></div>
      <div class="bg-image" data-index="1" style="transform: translateX(100%);"></div>
      <div class="bg-image" data-index="2" style="transform: translateX(100%);"></div>
    </div>
    <div class="landing-content">
      <h1 class="landing-title">昴星团</h1>
      <p class="landing-subtitle" id="landing-subtitle"><span class="landing-subtitle-text">Miku</span></p>
      <a href="/archives" class="enter-button">Button</a>
    </div>
    <div class="nav-zones">
      <div class="nav-zone nav-zone-left" id="nav-prev"></div>
      <div class="nav-zone nav-zone-center"></div>
      <div class="nav-zone nav-zone-right" id="nav-next"></div>
    </div>
    <div class="nav-hints">
      <span class="nav-hint nav-hint-left">‹</span>
      <span class="nav-hint nav-hint-right">›</span>
    </div>
  </div>

  <script>
    // 配置数据
    window.backgroundConfig = {
      backgrounds: [
        { image: '/landing/images/bg-1.jpg', subtitle: 'Miku' },
        { image: '/landing/images/bg-2.jpg', subtitle: 'Ayase' },
        { image: '/landing/images/bg-3.jpg', subtitle: 'Rin/Ren' }
      ],
      autoPlayInterval: 5000
    };
  </script>
  <script>
    (function() {
      'use strict';

      var config = window.backgroundConfig || { backgrounds: [], autoPlayInterval: 5000 };
      var backgrounds = config.backgrounds;
      var currentIndex = 0;
      var autoPlayTimer = null;
      var isTransitioning = false;

      var bgImages = document.querySelectorAll('.bg-image');
      var subtitleEl = document.getElementById('landing-subtitle');
      var prevBtn = document.getElementById('nav-prev');
      var nextBtn = document.getElementById('nav-next');

      function init() {
        if (backgrounds.length === 0) {
          console.warn('No backgrounds configured');
          return;
        }

        // Initialize background images
        bgImages.forEach(function(img, index) {
          if (backgrounds[index]) {
            img.style.backgroundImage = 'url(' + backgrounds[index].image + ')';
          }
        });

        // Update subtitle
        updateSubtitle(null, true);

        // Preload next image
        preloadImage(getNextIndex(1));

        // Start autoplay
        startAutoPlay();

        // Bind events
        bindEvents();
      }

      function getNextIndex(direction) {
        var newIndex = currentIndex + direction;
        if (newIndex < 0) {
          return backgrounds.length - 1;
        } else if (newIndex >= backgrounds.length) {
          return 0;
        }
        return newIndex;
      }

      function updateSubtitle(direction, isInitial) {
        if (!subtitleEl || !backgrounds[currentIndex]) return;
        
        var text = backgrounds[currentIndex].subtitle;
        var span = subtitleEl.querySelector('.landing-subtitle-text');
        
        if (isInitial) {
          span.textContent = text;
          return;
        }
        
        // Remove existing animation classes
        span.classList.remove('slide-in-right', 'slide-in-left');
        
        // Force reflow
        void span.offsetWidth;
        
        // Add appropriate animation class
        if (direction === 'next') {
          span.classList.add('slide-in-right');
        } else {
          span.classList.add('slide-in-left');
        }
        
        // Update text after a small delay to sync with animation
        setTimeout(function() {
          span.textContent = text;
        }, 50);
      }

      function preloadImage(index) {
        if (backgrounds[index]) {
          var img = new Image();
          img.src = backgrounds[index].image;
        }
      }

      function goToSlide(index, isManual, direction) {
        if (isTransitioning || index === currentIndex || backgrounds.length === 0) {
          return;
        }

        isTransitioning = true;
        
        // Determine direction if not provided
        if (!direction) {
          direction = index > currentIndex ? 'next' : 'prev';
        }

        // Get current and next elements using modulo like first version
        var currentBg = bgImages[currentIndex % bgImages.length];
        var nextBg = bgImages[index % bgImages.length];

        // Set next background image
        if (backgrounds[index]) {
          nextBg.style.backgroundImage = 'url(' + backgrounds[index].image + ')';
        }

        // Pre-position nextBg based on direction (without animation)
        // Remove transition class first
        nextBg.classList.remove('active', 'transition');
        if (direction === 'next') {
          // Next image starts from right
          nextBg.style.transform = 'translateX(100%)';
        } else {
          // Prev image starts from left
          nextBg.style.transform = 'translateX(-100%)';
        }

        // Force reflow to apply the pre-position instantly
        void nextBg.offsetWidth;

        // Add transition class for animation
        currentBg.classList.add('transition');
        nextBg.classList.add('transition');

        // Apply slide animations based on direction
        if (direction === 'next') {
          // Next: current slides left, next comes from right
          currentBg.style.transform = 'translateX(-100%)';
          currentBg.classList.remove('active');
          nextBg.style.transform = 'translateX(0)';
          nextBg.classList.add('active');
        } else {
          // Prev: current slides right, next comes from left
          currentBg.style.transform = 'translateX(100%)';
          currentBg.classList.remove('active');
          nextBg.style.transform = 'translateX(0)';
          nextBg.classList.add('active');
        }

        // Update index
        currentIndex = index;

        // Update subtitle with slide animation
        updateSubtitle(direction);

        // Preload next image
        preloadImage(getNextIndex(direction === 'next' ? 1 : -1));

        // Reset transition flag
        setTimeout(function() {
          isTransitioning = false;
        }, 650);

        // Reset autoplay only on manual navigation
        if (isManual) {
          resetAutoPlay();
        }
      }

      function nextSlide(isManual) {
        goToSlide(getNextIndex(1), isManual, 'next');
      }

      function prevSlide() {
        goToSlide(getNextIndex(-1), true, 'prev');
      }

      function startAutoPlay() {
        if (backgrounds.length <= 1) return;
        stopAutoPlay();
        autoPlayTimer = setInterval(function() {
          nextSlide(false);
        }, config.autoPlayInterval);
      }

      function stopAutoPlay() {
        if (autoPlayTimer) {
          clearInterval(autoPlayTimer);
          autoPlayTimer = null;
        }
      }

      function resetAutoPlay() {
        stopAutoPlay();
        startAutoPlay();
      }

      function bindEvents() {
        if (prevBtn) {
          prevBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            prevSlide();
          });
        }

        if (nextBtn) {
          nextBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            nextSlide(true);
          });
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
          if (e.key === 'ArrowLeft') {
            prevSlide();
          } else if (e.key === 'ArrowRight') {
            nextSlide(true);
          }
        });

        // Pause autoplay on hover
        var landingSection = document.getElementById('landing-section');
        if (landingSection) {
          landingSection.addEventListener('mouseenter', stopAutoPlay);
          landingSection.addEventListener('mouseleave', startAutoPlay);
        }

        // Visibility API
        document.addEventListener('visibilitychange', function() {
          if (document.hidden) {
            stopAutoPlay();
          } else {
            startAutoPlay();
          }
        });
      }

      // Initialize when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
